<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survival City</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        
        body {
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #111;
            color: white;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #222;
            overflow: hidden;
        }
        
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a2f1a;
        }
        
        #uiContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Меню */
        #menuScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .menuBtn {
            width: 200px;
            height: 60px;
            background-color: rgba(50, 50, 50, 0.8);
            border: 2px solid #444;
            border-radius: 5px;
            margin: 10px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: white;
            cursor: pointer;
            pointer-events: auto;
        }

        /* Выбор режима */
        #modeSelectScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 90;
        }
        
        .modeBtn {
            width: 300px;
            height: 120px;
            background-color: rgba(50, 50, 50, 0.8);
            border: 2px solid #444;
            border-radius: 10px;
            margin: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
            cursor: pointer;
            pointer-events: auto;
        }
        
        .modeBtn span {
            font-size: 16px;
            margin-top: 10px;
            color: #aaa;
        }

        /* Статистика */
        #statsContainer {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .stat-row {
            display: flex;
            gap: 15px;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 5px 10px;
            border-radius: 5px;
        }

        /* Управление */
        #hotbar {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 5px;
            pointer-events: auto;
        }
        
        .hotbarSlot {
            width: 40px;
            height: 40px;
            margin: 0 3px;
            background-color: rgba(50, 50, 50, 0.8);
            border: 2px solid #444;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }
        
        #inventoryBtn {
            position: absolute;
            bottom: 70px;
            right: 20px;
            width: 40px;
            height: 40px;
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid #444;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: white;
            cursor: pointer;
            pointer-events: auto;
        }
        
        #actionButtons {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        
        .actionBtn {
            width: 60px;
            height: 60px;
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid #444;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }

        /* Джойстик (только для мобильных) */
        #joystickArea {
            position: absolute;
            bottom: 70px;
            left: 20px;
            width: 80px;
            height: 80px;
            pointer-events: auto;
            display: none;
        }
        
        #joystickOuter {
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            position: relative;
        }
        
        #joystickInner {
            width: 40px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            position: absolute;
            top: 20px;
            left: 20px;
            touch-action: none;
            transition: transform 0.1s;
        }

        /* Пауза */
        #pauseScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 80;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Главное меню -->
        <div id="menuScreen">
            <div class="menuBtn" id="playBtn">ИГРАТЬ</div>
            <div class="menuBtn" id="settingsBtn">НАСТРОЙКИ</div>
            <div class="menuBtn" id="exitBtn">ВЫХОД</div>
        </div>
        
        <!-- Выбор режима -->
        <div id="modeSelectScreen">
            <div class="modeBtn" id="onlineBtn">
                ОНЛАЙН
                <span>Игра с друзьями</span>
            </div>
            <div class="modeBtn" id="offlineBtn">
                ОФФЛАЙН
                <span>Одиночная игра</span>
            </div>
        </div>
        
        <!-- Игровой интерфейс -->
        <div id="uiContainer">
            <div id="statsContainer">
                <div class="stat-row">
                    <span>❤️ 100%</span>
                    <span>🟡 10</span>
                    <span>🕒 12:45</span>
                </div>
                <div class="stat-row">
                    <span>🍗 80%</span>
                </div>
            </div>
            
            <div id="pauseBtn">⏸</div>
            
            <div id="joystickArea">
                <div id="joystickOuter">
                    <div id="joystickInner"></div>
                </div>
            </div>
            
            <div id="hotbar">
                <div class="hotbarSlot selected">🪓</div>
                <div class="hotbarSlot">⛏️</div>
                <div class="hotbarSlot">🔫</div>
                <div class="hotbarSlot">🏗️</div>
                <div class="hotbarSlot"></div>
            </div>
            
            <div id="inventoryBtn">⋯</div>
            
            <div id="actionButtons">
                <div class="actionBtn" id="attackBtn">⚔️</div>
                <div class="actionBtn" id="buildBtn">🏗️</div>
            </div>
        </div>
        
        <!-- Экран паузы -->
        <div id="pauseScreen">
            <div class="menuBtn" id="resumeBtn">ПРОДОЛЖИТЬ</div>
            <div class="menuBtn" id="menuBtn">В МЕНЮ</div>
        </div>
    </div>

    <script>
        // Инициализация игры
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Состояние игры
        const gameState = {
            player: {
                x: 0,
                y: 0,
                speed: 3,
                health: 100,
                hunger: 80,
                gold: 10,
                inventory: ['🪓', '⛏️', '🔫', '🏗️', ''],
                hotbar: ['🪓', '⛏️', '🔫', '🏗️', ''],
                selectedSlot: 0,
                currentAction: 'move'
            },
            time: {
                hours: 12,
                minutes: 45,
                lastUpdate: 0
            },
            objects: [
                { type: 'tree', x: 200, y: 150 },
                { type: 'wall', x: 300, y: 200 }
            ],
            screen: 'menu',
            paused: false,
            isMobile: /Mobi|Android/i.test(navigator.userAgent)
        };
        
        // Элементы интерфейса
        const menuScreen = document.getElementById('menuScreen');
        const modeSelectScreen = document.getElementById('modeSelectScreen');
        const playBtn = document.getElementById('playBtn');
        const onlineBtn = document.getElementById('onlineBtn');
        const offlineBtn = document.getElementById('offlineBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resumeBtn = document.getElementById('resumeBtn');
        const menuBtn = document.getElementById('menuBtn');
        const attackBtn = document.getElementById('attackBtn');
        const buildBtn = document.getElementById('buildBtn');
        const hotbarSlots = document.querySelectorAll('.hotbarSlot');
        const joystickArea = document.getElementById('joystickArea');
        const joystickInner = document.getElementById('joystickInner');
        
        // Настройка управления для ПК
        const keys = {
            w: false,
            a: false,
            s: false,
            d: false
        };
        
        // Инициализация
        function init() {
            resizeCanvas();
            setupEventListeners();
            
            if (gameState.isMobile) {
                joystickArea.style.display = 'block';
                setupJoystick();
            }
            
            gameLoop();
        }
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gameState.player.x = canvas.width / 2;
            gameState.player.y = canvas.height / 2;
        }
        
        function setupEventListeners() {
            // Кнопки меню
            playBtn.addEventListener('click', () => {
                menuScreen.style.display = 'none';
                modeSelectScreen.style.display = 'flex';
            });
            
            onlineBtn.addEventListener('click', () => {
                alert('Онлайн режим в разработке');
            });
            
            offlineBtn.addEventListener('click', startGame);
            
            // Управление игрой
            pauseBtn.addEventListener('click', togglePause);
            resumeBtn.addEventListener('click', togglePause);
            menuBtn.addEventListener('click', returnToMenu);
            
            // Горячие клавиши
            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
            
            // Кнопки действий
            attackBtn.addEventListener('click', () => {
                gameState.player.currentAction = 'attack';
            });
            
            buildBtn.addEventListener('click', () => {
                gameState.player.currentAction = 'build';
            });
            
            // Выбор слота
            hotbarSlots.forEach((slot, index) => {
                slot.addEventListener('click', () => {
                    selectHotbarSlot(index);
                });
            });
            
            // Ресайз
            window.addEventListener('resize', resizeCanvas);
        }
        
        function setupJoystick() {
            let joystickActive = false;
            let startX = 0, startY = 0;
            
            joystickArea.addEventListener('touchstart', (e) => {
                if (gameState.screen !== 'game' || gameState.paused) return;
                
                const touch = e.touches[0];
                const rect = joystickArea.getBoundingClientRect();
                
                joystickActive = true;
                startX = rect.left + rect.width / 2;
                startY = rect.top + rect.height / 2;
                
                e.preventDefault();
            });
            
            joystickArea.addEventListener('touchmove', (e) => {
                if (!joystickActive) return;
                
                const touch = e.touches[0];
                const x = touch.clientX - startX;
                const y = touch.clientY - startY;
                const distance = Math.sqrt(x*x + y*y);
                const maxDistance = 30;
                
                if (distance > maxDistance) {
                    const angle = Math.atan2(y, x);
                    joystickInner.style.transform = `translate(${Math.cos(angle) * maxDistance}px, ${Math.sin(angle) * maxDistance}px)`;
                } else {
                    joystickInner.style.transform = `translate(${x}px, ${y}px)`;
                }
                
                e.preventDefault();
            });
            
            joystickArea.addEventListener('touchend', () => {
                joystickActive = false;
                joystickInner.style.transform = 'translate(0, 0)';
            });
        }
        
        function handleKeyDown(e) {
            if (gameState.screen !== 'game' || gameState.paused) return;
            
            switch(e.key.toLowerCase()) {
                case 'w': keys.w = true; break;
                case 'a': keys.a = true; break;
                case 's': keys.s = true; break;
                case 'd': keys.d = true; break;
                case '1': selectHotbarSlot(0); break;
                case '2': selectHotbarSlot(1); break;
                case '3': selectHotbarSlot(2); break;
                case '4': selectHotbarSlot(3); break;
                case '5': selectHotbarSlot(4); break;
                case ' ': gameState.player.currentAction = 'attack'; break;
            }
        }
        
        function handleKeyUp(e) {
            switch(e.key.toLowerCase()) {
                case 'w': keys.w = false; break;
                case 'a': keys.a = false; break;
                case 's': keys.s = false; break;
                case 'd': keys.d = false; break;
                case ' ': gameState.player.currentAction = 'move'; break;
            }
        }
        
        function selectHotbarSlot(index) {
            document.querySelector('.hotbarSlot.selected').classList.remove('selected');
            hotbarSlots[index].classList.add('selected');
            gameState.player.selectedSlot = index;
        }
        
        function startGame() {
            modeSelectScreen.style.display = 'none';
            gameState.screen = 'game';
            gameState.paused = false;
            gameState.time.lastUpdate = performance.now();
        }
        
        function togglePause() {
            gameState.paused = !gameState.paused;
            document.getElementById('pauseScreen').style.display = gameState.paused ? 'flex' : 'none';
        }
        
        function returnToMenu() {
            gameState.paused = false;
            document.getElementById('pauseScreen').style.display = 'none';
            gameState.screen = 'menu';
            menuScreen.style.display = 'flex';
        }
        
        function update(deltaTime) {
            if (gameState.screen !== 'game' || gameState.paused) return;
            
            // Движение игрока
            let dx = 0, dy = 0;
            
            if (keys.w) dy = -gameState.player.speed;
            if (keys.a) dx = -gameState.player.speed;
            if (keys.s) dy = gameState.player.speed;
            if (keys.d) dx = gameState.player.speed;
            
            // Нормализация диагонального движения
            if (dx !== 0 && dy !== 0) {
                const len = Math.sqrt(dx*dx + dy*dy);
                dx = (dx / len) * gameState.player.speed;
                dy = (dy / len) * gameState.player.speed;
            }
            
            gameState.player.x += dx;
            gameState.player.y += dy;
            
            // Границы экрана
            gameState.player.x = Math.max(0, Math.min(canvas.width, gameState.player.x));
            gameState.player.y = Math.max(0, Math.min(canvas.height, gameState.player.y));
            
            // Обновление времени
            gameState.time.minutes += deltaTime / 1000 * 0.1;
            if (gameState.time.minutes >= 60) {
                gameState.time.minutes = 0;
                gameState.time.hours++;
                if (gameState.time.hours >= 24) gameState.time.hours = 0;
            }
        }
        
        function render() {
            // Очистка
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (gameState.screen === 'game') {
                // Отрисовка объектов
                gameState.objects.forEach(obj => {
                    if (obj.type === 'tree') {
                        ctx.fillStyle = '#2a5c2a';
                        ctx.fillRect(obj.x - 15, obj.y - 30, 30, 60);
                        ctx.fillStyle = '#5c3a1e';
                        ctx.fillRect(obj.x - 5, obj.y, 10, 30);
                    } else if (obj.type === 'wall') {
                        ctx.fillStyle = '#888';
                        ctx.fillRect(obj.x - 20, obj.y - 10, 40, 20);
                    }
                });
                
                // Отрисовка игрока
                ctx.fillStyle = '#3498db';
                ctx.fillRect(gameState.player.x - 15, gameState.player.y - 15, 30, 30);
                
                // Индикатор действия
                if (gameState.player.currentAction === 'attack') {
                    ctx.strokeStyle = 'red';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(gameState.player.x, gameState.player.y, 35, 0, Math.PI*2);
                    ctx.stroke();
                }
            }
        }
        
        function gameLoop(timestamp = 0) {
            const deltaTime = timestamp - (gameState.time.lastUpdate || timestamp);
            gameState.time.lastUpdate = timestamp;
            
            update(deltaTime);
            render();
            
            requestAnimationFrame(gameLoop);
        }
        
        // Запуск игры
        init();
    </script>
</body>
</html>
